    /* อีโมจิลอยหลัง container */
.floating-emoji {
  position: absolute;
  font-size: 2rem;
  animation: float 10s linear infinite;
  pointer-events: none; /* คลิกทะลุได้ */
  opacity: 0.7;
}

@keyframes float {
  0% { transform: translateY(100vh) translateX(0) rotate(0deg);}
  50% { transform: translateY(50vh) translateX(20px) rotate(180deg);}
  100% { transform: translateY(-10vh) translateX(-20px) rotate(360deg);}
}

body {
  margin:0;
  padding:0;
  font-family:'Anuphan',sans-serif;
  background: linear-gradient(135deg,#ffe4f3,#dbeafe);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
  position:relative;
}

/* gradient เบลอหลัง container */
body::before {
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: linear-gradient(120deg,#ff9ec1,#9ad1fc,#ffdd95,#c0ffc0);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  z-index:0;
  filter:blur(60px);
  opacity:0.5;
}

@keyframes gradientShift {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container {
  width:95%;
  max-width:520px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(25px);
  border-radius:30px;
  padding:30px;
  text-align:center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  transition: all 0.3s ease;
  position:relative;
  z-index:2;
}

.opt {
  background: white;
  padding: 28px 24px;      /* เพิ่มพื้นที่ให้ใหญ่ขึ้นประมาณ 2 เท่า */
  border-radius: 25px;     /* โค้งใหญ่ขึ้น */
  margin: 16px 0;          /* เว้นระยะห่างมากขึ้น */
  cursor: pointer;
  transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
  transform-origin: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.15); /* เงาใหญ่เด่นขึ้น */
  font-size: 2rem;         /* ขนาดตัวอักษรใหญ่ขึ้น 2 เท่า */
  text-align: center;      /* จัดกลางแบบซีเอ็นเอ็น */
  line-height: 1.4;        /* ให้ข้อความไม่ชิดกัน */
}
.opt:hover {
  transform: scale(1.08);
  background: #ff8cb1; 
  box-shadow: 0 14px 30px rgba(0,0,0,0.25); /* hover เงาเด่นมาก */
}
  

/* กล่องข้างนอกใหญ่ขึ้น */
.wrap {
  width: 95%;
  max-width: 1000px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(25px);
  border-radius: 30px;
  padding: 50px 30px; /* เพิ่ม padding ด้านบน-ล่าง */
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
  transition: all 0.3s ease;
  position: relative;
  z-index: 2;
   /* ความสูงกล่องใหญ่ขึ้น */
}

/* ขยายตัวอักษรคำถาม 50% */
.qtxt {
  font-size: 2rem; /* เดิม 1.1rem → เพิ่ม ~50% */
  font-weight: 600;
  color: #3b0764;
  margin-bottom: 2rem;
  line-height: 1.5;
}

/* ตัวเลือกคำตอบ */

  font-size: 2rem; /* เพิ่มจากเดิม 0.95rem → ~70% */
  padding: 20px 18px; /* กล่องใหญ่ขึ้น */
  border-radius: 20px;
}

/* ผลลัพธ์ */

}

.result-style {
  font-size: 2rem; /* เดิม 0.85rem → เพิ่ม ~40% */
  color: #a0698a;
}

["สวิตช์สมดุล ⚖️","เป็นได้ทั้งรุกและรับตามสถานการณ์"],
["สวิตช์สายชิล 😎","ไม่ซีเรียส ปรับตัวเก่ง"],
["สวิตช์สายเล่น 😏","ชอบเปลี่ยนบทบาทไปมา"],
["สวิตช์สายลึก 🧠","เข้าใจทั้งสองฝั่ง"],
["สวิตช์สายอิสระ 🕊️","ไม่ยึดติดบทบาท"],
["สวิตช์สายคุมเกม 🔄","บางทีก็รุก บางทีก็คุมเกม"],
["สวิตช์สายโรแมนติก 💫","มีทั้งความหวานและความนำ"],
["สวิตช์สายนิ่ง 🧊","ดูสงบแต่เปลี่ยนได้"],
["สวิตช์สายแพรวพราว ✨","มีหลายมิติในตัวเอง"],
["สวิตช์สายบาลานซ์ 🎯","รู้ว่าเมื่อไหร่ควรเป็นอะไร"],
["สวิตช์สายขี้เล่น 🎉","สนุกสนาน ชอบเปลี่ยนบทบาท"],
["สวิตช์สายอบอุ่น 💖","ใส่ใจและดูแลทั้งสองฝั่ง"],
["สวิตช์สายเด็ดขาด ⚡","ตัดสินใจเร็วเมื่อจำเป็น"],
["สวิตช์สายลึกลับ 🌙","เก็บตัวแต่มีเสน่ห์ชวนค้นหา"],
["สวิตช์สายแฟนตาซี 🌟","จินตนาการสูง ชอบสร้างสีสัน"]
]
};

let idx=0;
let S={dom:0,sub:0,attach:0,avoid:0,express:0,reserve:0};
const app=document.getElementById("app");

function render(){
  if(idx>=Q.length){showResult();return;}
  const pct=Math.round(idx/Q.length*100);
  const q=Q[idx];
  app.innerHTML=`
    <div class="prog"><div class="bar" style="width:${pct}%"></div></div>
    <div class="qnum">${idx+1} / ${Q.length}</div>
    <div class="qtxt">${q[0]}</div>
    ${q[1].map((o,i)=>`<div class="opt" onclick="pick(${i})">${o[0]}</div>`).join("")}
  `;
}

function pick(i){
  const sc=Q[idx][1][i][1];
  for(const k in sc) S[k]+=sc[k];
  idx++;
  render();
}

function showResult(){
  const total=Object.values(S).reduce((a,b)=>a+b,0)||1;
  const domP=S.dom/total;
  const subP=S.sub/total;
  const attachP=S.attach/total;
  const avoidP=S.avoid/total;
  const expP=S.express/total;
  const resP=S.reserve/total;
  const di=(domP*1.1)-(subP*1.1);
  const main=Math.abs(di)<0.05?"สวิตช์":di>0?"เมะ":"เคะ";
  const pool=TYPES[main];
  const picked=pool[Math.floor(Math.random()*pool.length)];
  const emotIdx=attachP-avoidP;
  const style=emotIdx>0.1?"เป็นคนผูกพันและให้ความสำคัญกับความรู้สึก":emotIdx<-0.1?"รักอิสระ ต้องการพื้นที่ส่วนตัว":"มีความสมดุลทางอารมณ์";

  app.innerHTML=`
    <div class="prog"><div class="bar" style="width:100%"></div></div>
    <div class="result-title">${main}</div>
    <div class="result-sub">${picked[0]}</div>
    <div class="result-desc">${picked[1]}</div>
    <div class="result-style">${style}</div>
    <div class="chart-wrap"><canvas id="radar"></canvas></div>
    <button class="restart" onclick="restart()">เล่นอีกครั้ง ↺</button>
  `;

  new Chart(document.getElementById("radar"),{
    type:"radar",
    data:{
      labels:["เมะ","เคะ","ผูกพัน","อิสระ","แสดงออก","เก็บตัว"],
      datasets:[{
        data:[
          Math.round(domP*100),Math.round(subP*100),Math.round(attachP*100),
          Math.round(avoidP*100),Math.round(expP*100),Math.round(resP*100)
        ],
        borderColor:"#ff6b9d",
        backgroundColor:"rgba(255,107,157,0.15)",
        pointBackgroundColor:"#7c3aed",
        borderWidth:2,
        pointRadius:4
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}},
      scales:{r:{beginAtZero:true,max:100,ticks:{display:false},grid:{color:"rgba(180,130,200,0.25)"},pointLabels:{font:{size:13,family:"Anuphan"}}}}
    }
  });
}

function restart(){
  idx=0;
  S={dom:0,sub:0,attach:0,avoid:0,express:0,reserve:0};
  render();
}

render();
</script>
</body>
</html>
